apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devsecops-demo
  labels:
    app: ai-devsecops-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devsecops-demo
  template:
    metadata:
      labels:
        app: ai-devsecops-demo
    spec:
      containers:
        - name: api
          image: ghcr.io/YOUR_USERNAME/ai-devsecops-demo:v1.0.0
          ports:
            - containerPort: 8000
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-devsecops-demo
spec:
  selector:
    app: ai-devsecops-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
