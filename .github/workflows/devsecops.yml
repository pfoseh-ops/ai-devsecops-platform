# DevSecOps pipeline (place this file as .github/workflows/devsecops.yml)
# This is a copy of the CI workflow for convenience in the repo root.

name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ '*' ]

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: |
          mkdir -p reports
          pytest -q | tee reports/test-report.txt
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test-report.txt

  sast:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python dependencies (incl. dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run Bandit (output json+txt)
        run: |
          mkdir -p reports
          bandit -r src -f json -o reports/sast-report.json || true
          bandit -r src -f txt -o reports/sast-report.txt || true
      - name: Fail on HIGH+HIGH Bandit findings
        run: >
          python - <<'PY'
          import json,sys,os
          p='reports/sast-report.json'
          if not os.path.exists(p):
              print('Bandit JSON report missing; skipping hard-fail')
              sys.exit(0)
          j=json.load(open(p))
          issues=j.get('results',[])
          for i in issues:
              if i.get('issue_severity','').upper()=='HIGH' and i.get('issue_confidence','').upper()=='HIGH':
                  print('High severity+confidence issue found:', i.get('test_name'))
                  sys.exit(1)
          print('No high severity+confidence Bandit issues')
          sys.exit(0)
          PY
      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: reports/sast-report.txt

  sca:
    name: SCA - Trivy filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python dependencies (for report tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.12.0
        with:
          scan-type: fs
          scan-path: "."
          output: reports/sca-report.txt
          format: table
      - name: Upload SCA report
        uses: actions/upload-artifact@v4
        with:
          name: sca-report
          path: reports/sca-report.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build with Docker Compose
        run: |
          docker compose build --no-cache
      - name: Save image info
        run: |
          mkdir -p reports
          echo "Docker build completed" > reports/build-report.txt
      - name: Upload build report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: reports/build-report.txt

  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Start app with docker compose
        run: |
          docker compose up -d --build
      - name: Wait for health endpoint
        run: |
          mkdir -p reports
          # Try localhost first, then host.docker.internal
          for i in {1..30}; do
            if curl -sSf http://localhost:8000/health -o /dev/null; then
              echo "SCAN_TARGET=http://localhost:8000" >> $GITHUB_ENV
              break
            fi
            if curl -sSf http://host.docker.internal:8000/health -o /dev/null; then
              echo "SCAN_TARGET=http://host.docker.internal:8000" >> $GITHUB_ENV
              break
            fi
            sleep 2
          done
          if [ -z "$SCAN_TARGET" ]; then
            echo "App health check failed" >&2
            exit 1
          fi
      - name: Run OWASP ZAP baseline
        run: |
          docker run --rm -v ${{ github.workspace }}/reports:/zap/wrk/:rw owasp/zap2docker-stable zap-baseline.py -t $SCAN_TARGET -r /zap/wrk/zap-report.html -I || true
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/zap-report.html
      - name: Stop app
        if: always()
        run: |
          docker compose down

  report:
    name: Generate combined report
    runs-on: ubuntu-latest
    needs: [tests, sca, sast, dast]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Generate combined report
        run: |
          python scripts/generate_report.py || true
      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-report
          path: reports/devsecops-report.md
