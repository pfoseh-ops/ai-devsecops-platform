name: AI DevSecOps Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

  scanner:
    name: DevSecOps Scanner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI DevSecOps compliance scan
        run: python -m src.ai_guard.scan --target . --output reports/devsecops-report.md --fail-on critical

      - name: Upload DevSecOps report
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-report
          path: reports/devsecops-report.md
          retention-days: 14

  build:
    name: Build (on push only)
    needs: [test, scanner]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and cache Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: ai-devsecops-demo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
